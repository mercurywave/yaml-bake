# Hospital Database Schema
databases:
  patients:
    display: "{firstName} {lastName}"
    fields:
      firstName:
        type: string
        required: true
      lastName:
        type: string
        required: true
      admitting:
        type: reference
        target: doctors
      diagnosis:
        type: object
        fields:
          code:
            type: string
          location:
            type: object
            fields:
              laterality:
                type: string
              region:
                type: string
              position:
                type: string
      status:
        type: eStatus
  doctors:
    display: "{firstName} {lastName}"
    fields:
      firstName:
        type: string
        required: true
      lastName:
        type: string
        required: true
      credentials:
        type: TCredentials
  nurses:
    display: "{firstName} {lastName}"
    fields:
      firstName:
        type: string
        required: true
      lastName:
        type: string
        required: true
      credentials:
        type: TCredentials
  medications:
    fields:
      name:
        type: string
        required: true
      dose:
        type: object
        fields:
          value:
            type: number
            required: true
          unit:
            type: string
            required: true
types:
  TCredentials:
    type: object
    fields:
      license:
        type: string
      abbreviation:
        type: string
      specialty:
        type: string
  eStatus:
    type: enum
    options: [Alive, Deceased]