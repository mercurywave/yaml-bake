# School Database Schema
databases:
  students:
    fields:
      id:
        type: string
        required: true
        unique: true
      firstName:
        type: string
        required: true
      lastName:
        type: string
        required: true
      email:
        type: string
        required: true
      grade:
        type: number
        required: true
      dateOfBirth:
        type: date
        required: true
      enrollmentDate:
        type: date
        required: true
      classroom:
        type: reference
        required: true
        target: classrooms
      teacher:
        type: reference
        required: true
        target: teachers
  teachers:
    fields:
      id:
        type: string
        required: true
        unique: true
      firstName:
        type: string
        required: true
      lastName:
        type: string
        required: true
      email:
        type: string
        required: true
      subject:
        type: string
        required: true
      hireDate:
        type: date
        required: true
      classroom:
        type: reference
        target: classrooms
  classes:
    fields:
      id:
        type: string
        required: true
        unique: true
      name:
        type: string
        required: true
      description:
        type: string
      subject:
        type: string
        required: true
      teacher:
        type: reference
        required: true
        target: teachers
      students:
        type: array
        items:
          type: reference
          target: students
      classroom:
        type: reference
        required: true
        target: classrooms
  classrooms:
    fields:
      id:
        type: string
        required: true
        unique: true
      name:
        type: string
        required: true
      building:
        type: string
        required: true
      floor:
        type: number
      capacity:
        type: number
      equipment:
        type: array
        items:
          type: string