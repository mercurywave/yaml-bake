# School Database Schema
databases:
  students:
    display: "{firstName} {lastName}"
    fields:
      firstName:
        type: string
        required: true
      lastName:
        type: string
        required: true
      grade:
        type: number
        required: true
  teachers:
    fields:
      firstName:
        type: string
        required: true
      lastName:
        type: string
        required: true
      subject:
        type: string
      classroom:
        type: reference
        target: classrooms
  classes:
    fields:
      name:
        type: string
        required: true
      description:
        type: string
      subject:
        type: string
        required: true
      teacher:
        type: reference
        target: teachers
      students:
        type: array
        items:
          type: reference
          target: students
      classroom:
        type: reference
        target: classrooms
  classrooms:
    fields:
      name:
        type: string
        required: true
      building:
        type: string
        required: true
      floor:
        type: number
      capacity:
        type: number
      equipment:
        type: array
        items:
          type: string